{% extends 'base.html' %}

{% block title %}Sign Up{% endblock %}

{% block content %}

<div class="auth-container">
    <div class="auth-card">
        <h2>Create Account</h2>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit" class="btn btn-solid">Sign Up</button>
        </form>
    </div>
</div>

{% endblock %}
