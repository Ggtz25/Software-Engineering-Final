{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}

<div class="auth-container">
    <div class="auth-card">
        <h2>Login</h2>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit" class="btn btn-solid">Log In</button>
        </form>

        <p>
            Don't have an account?
            <a href="/signup/">Create one</a>
        </p>
    </div>
</div>

{% endblock %}
